# Netlify configuration for comedyaddiction.com
# Static site — no build step needed

[build]
publish = "."

[[redirects]]
from = "/chuckle.html"
to = "/chuckle"
status = 301

[[redirects]]
from = "/premium.html"
to = "/premium"
status = 301

[[redirects]]
from = "/comedians.html"
to = "/comedians"
status = 301

[[redirects]]
from = "/about.html"
to = "/about"
status = 301

[[redirects]]
from = "/contact.html"
to = "/contact"
status = 301

[[redirects]]
from = "/privacy.html"
to = "/privacy"
status = 301

[[redirects]]
from = "/support.html"
to = "/support"
status = 301

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/screenshots/*"
[headers.values]
  Cache-Control = "public, max-age=604800, immutable"

[[headers]]
for = "/*.png"
[headers.values]
  Cache-Control = "public, max-age=604800, immutable"

[[headers]]
for = "/*.ico"
[headers.values]
  Cache-Control = "public, max-age=604800, immutable"

[[headers]]
for = "/styles.css"
[headers.values]
  Cache-Control = "public, max-age=86400"
